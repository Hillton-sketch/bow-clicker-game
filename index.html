<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bow Clicker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section>
        <div class="main">
            <div class="left">
                <h3>Bows: <span class="bow-cost">0</span></h3>
                <img src="/assets/bow-image.png" class ="bow-image" onclick ="incrementBow()" draggable ="false">
            </div>
            <div class ="right">
                <div class ="upgrade" onclick="buyClicker()">
                    <div class ="left-section">
                        <img src ="/assets/click-upgrade.png" class ="clicker-upgrade">
                    </div>
                    <div class ="mid-section">
                        <h4>Auto Clicker
                            <div class="cost-info">
                                <p>Cost: <span class="clicker-cost">15</span></p>
                                <img src="/assets/bow-image.png" class ="bow-img">
                            </div>
                        </h4>
                    </div>
                <div class ="right-section">level 0</div>

                <div class="next-level-info">
                    <p>
                        +<span class="cursor-increase">1</span> Bows <br> per second
                    </p>

                </div>
            </div>
            </div>
        </div>
    </section>
    <script src="index.js"></script>
</body>
</html>
